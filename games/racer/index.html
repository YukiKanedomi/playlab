<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>はしって、よけて。 — Playlab</title>
    <link rel="icon" type="image/svg+xml" href="/playlab/icon.svg" />
    <link rel="apple-touch-icon" href="/playlab/apple-touch-icon.png" />
    <link rel="manifest" href="/playlab/manifest.webmanifest" />
    <meta name="theme-color" content="#bfe3ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Playlab" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #bfe3ff; }
      body {
        font-family: system-ui, sans-serif;
        touch-action: none; -webkit-user-select: none; user-select: none; overscroll-behavior: none;
      }
      #game { display: block; width: 100vw; height: 100dvh; touch-action: none; }
      .back {
        position: fixed; top: max(12px, env(safe-area-inset-top)); left: max(12px, env(safe-area-inset-left));
        z-index: 10; color: #234; text-decoration: none; font-size: 13px; letter-spacing: 0.02em;
        padding: 6px 10px; border: 1px solid rgba(20,40,60,0.25); border-radius: 999px; background: rgba(255,255,255,0.5);
      }
      .back:active { color: #000; }
      /* UIオーバーレイ */
      #hud { position: fixed; inset: 0; z-index: 5; pointer-events: none; color: #16324a;
        font-family: system-ui, sans-serif; }
      #score { position: absolute; top: max(14px, env(safe-area-inset-top)); left: 0; right: 0; text-align: center;
        font-size: 30px; font-weight: 800; text-shadow: 0 2px 6px rgba(255,255,255,0.5); }
      .card { position: absolute; left: 0; right: 0; top: 42%; transform: translateY(-50%); text-align: center; padding: 0 20px; }
      .card h1 { font-size: clamp(28px, 8vw, 44px); font-weight: 800; margin: 0 0 10px; color: #16324a; }
      .card p { margin: 4px 0; color: #3a5a72; font-size: 14px; }
      .card .cta { margin-top: 18px; font-weight: 800; color: #d2622a; font-size: 16px; animation: blink 1.2s ease-in-out infinite; }
      @keyframes blink { 50% { opacity: 0.4; } }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <a class="back" href="../../">← lab</a>
    <canvas id="game"></canvas>
    <div id="hud">
      <div id="score" class="hidden"></div>
      <div id="titleCard" class="card">
        <h1>はしって、よけて。</h1>
        <p>指で左右にハンドル（自動で前進）</p>
        <p>迫る車や木をよけて距離をのばせ</p>
        <p id="titleBest"></p>
        <div class="cta">タップでスタート</div>
      </div>
      <div id="overCard" class="card hidden">
        <h1>クラッシュ！</h1>
        <p id="overScore"></p>
        <p id="overBest"></p>
        <div class="cta">タップでもう一度</div>
      </div>
      <div id="loading" class="card"><p>読み込み中…</p></div>
    </div>
    <script type="module" src="./main.ts"></script>
    <script>
      if ('serviceWorker' in navigator)
        navigator.serviceWorker.register('/playlab/sw.js').catch(() => {})
    </script>
  </body>
</html>
