<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>5秒、くりかえし。 — Playlab</title>
    <link rel="icon" type="image/svg+xml" href="/playlab/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/playlab/favicon-32.png" />
    <link rel="apple-touch-icon" href="/playlab/apple-touch-icon.png" />
    <link rel="manifest" href="/playlab/manifest.webmanifest" />
    <meta name="theme-color" content="#f3efe6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Playlab" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #f3efe6; }
      body {
        font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
        touch-action: none; -webkit-user-select: none; user-select: none; overscroll-behavior: none;
      }
      #game { display: block; width: 100vw; height: 100dvh; touch-action: none; }
      .back {
        position: fixed; top: max(12px, env(safe-area-inset-top)); left: max(12px, env(safe-area-inset-left));
        z-index: 10; color: #76726a; text-decoration: none; font-size: 13px; letter-spacing: 0.02em;
        padding: 6px 10px; border: 1px solid rgba(24, 23, 19, 0.18); border-radius: 999px; background: rgba(255, 255, 255, 0.5);
      }
      .back:active { color: #181713; }
    </style>
  </head>
  <body>
    <a class="back" href="../../">← lab</a>
    <canvas id="game"></canvas>
    <script type="module" src="./main.ts"></script>
    <script>
      if ('serviceWorker' in navigator)
        navigator.serviceWorker.register('/playlab/sw.js').catch(() => {})
    </script>
  </body>
</html>
